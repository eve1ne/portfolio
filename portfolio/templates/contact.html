{% extends "layout.html" %}

{% block page_styles %}
<style>
  .hero {
    background-image: 
      url('/static/uploads/assets/hero-home.png');
  }
  .hero > div > h1 {
    color: #1B1A54;
  }
  .hero > div > p {
    color: #525C91;
  }
</style>
{% endblock %}

{% block content %}
<section class="hero">
    <div>
        <h1>Contact</h1>
    </div>
</section>

<section>
  <p>
    I'm always open to new opportunities and collaborations. <br>
    Feel free to reach out to me via email or connect with me on LinkedIn.
  </p>
  <a href="mailto:evel3304@gmail.com" class="button media-button">Email Me</a>
  <a href="https://www.linkedin.com/in/evelyne-lee/" target="_blank" class="button cs-button">LinkedIn</a>
    <form action="/contact/" method="POST">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        
        <button type="submit">Send Message</button>
    </form>
</section>



{% endblock %}
